title: Water Decisions
description: >
  Exploring water infrastructure resilience through real-world case studies
  assessed against UNDRR Principles and ISO 22372.
url: "https://visioninglab.github.io"
baseurl: "/waterdecisions"

# Collections
collections:
  case_studies:
    output: true
    permalink: /:slug.html

# Defaults
defaults:
  - scope:
      path: ""
      type: "case_studies"
    values:
      layout: "case-study"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  parse_block_html: true

# Exclude from build
exclude:
  - decrypted/
  - DIRcasestudies_v1/
  - DIRcasestudies_v1.zip
  - docs/
  - "*.ps1"
  - .staticrypt.json
  - Gemfile.lock
  - node_modules/
  - README.md
  - CLAUDE.md
