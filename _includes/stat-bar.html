{% if page.stats %}
<div style="max-width: 1100px; margin: -1.5rem auto 0; padding: 0 2rem; position: relative; z-index: 2;">
  <div class="stat-bar">
    {% for stat in page.stats %}
    <div class="stat-item"><div class="stat-num">{{ stat.value }}</div><div class="stat-label">{{ stat.label }}</div></div>
    {% endfor %}
  </div>
</div>
{% endif %}
